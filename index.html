<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmyčkArt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f7f3fd;
    --panel: #ede5f8;
    --border: #b89cd8;
    --accent: #6b3fa0;
    --accent2: #9b6ed4;
    --text: #2a1545;
    --grid-border: #b89cd8;
    --shadow: rgba(70,30,130,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Decorative top yarn */
  header {
    background: linear-gradient(120deg, #4a1a7a 0%, #6b3fa0 55%, #9b6ed4 100%);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 3px 12px var(--shadow);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    color: #fdf6ee;
    font-size: 1.6rem;
    letter-spacing: 0.03em;
  }
  header span.sub {
    color: #d8b8f5;
    font-size: 0.75rem;
    margin-top: 2px;
    display: block;
  }
  .yarn-icon { font-size: 2rem; }

  .app {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--panel);
    border-right: 2px solid var(--border);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }

  /* Tool buttons */
  .tools { display: flex; flex-wrap: wrap; gap: 6px; }
  .tool-btn {
    flex: 1;
    min-width: 44px;
    padding: 8px 6px;
    border: 2px solid var(--border);
    background: #fff8f0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    text-align: center;
    transition: all 0.15s;
    position: relative;
  }
  .tool-btn:hover { background: var(--accent2); border-color: var(--accent); color: white; }
  .tool-btn.active { background: linear-gradient(120deg, #4a1a7a 0%, #6b3fa0 55%, #9b6ed4 100%); border-color: var(--accent); color: white; box-shadow: 0 2px 8px var(--shadow); }
  .tool-btn title-tip { display: none; }

  /* Color palette */
  .palette {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }
  .color-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--accent); }

  /* Custom color */
  .custom-color-row {
    display: flex; gap: 8px; align-items: center; margin-top: 4px;
  }
  .custom-color-row input[type=color] {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-radius: 6px; cursor: pointer; padding: 2px; background: white;
  }
  .custom-color-row span { font-size: 0.7rem; color: var(--accent); }

  /* Symbol palette */
  .symbols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .sym-btn {
    aspect-ratio: 1;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: #fff8f0;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .sym-btn:hover { background: var(--accent2); color: white; }
  .sym-btn.active { background: linear-gradient(120deg, #4a1a7a 0%, #6b3fa0 55%, #9b6ed4 100%); color: white; border-color: var(--accent); }

  /* Grid settings */
  .settings { display: flex; flex-direction: column; gap: 8px; }
  .setting-row { display: flex; align-items: center; gap: 6px; }
  .setting-row label { font-size: 0.7rem; color: var(--accent); width: 60px; }
  .setting-row input[type=range] {
    flex: 1; accent-color: var(--accent);
  }
  .setting-row .val { font-size: 0.75rem; min-width: 22px; text-align: right; }
  .setting-row input[type=number] {
    width: 52px; border: 1.5px solid var(--border);
    border-radius: 4px; padding: 3px 4px;
    background: #fff8f0; font-family: 'DM Mono', monospace;
    font-size: 0.75rem; color: var(--text);
  }

  /* Buttons */
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn {
    flex: 1;
    padding: 7px 4px;
    border: 2px solid var(--border);
    background: #fff8f0;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text);
    transition: all 0.15s;
    text-align: center;
  }
  .btn:hover { background: var(--accent2); color: white; border-color: var(--accent2); }
  .btn.primary { background: linear-gradient(120deg, #4a1a7a 0%, #6b3fa0 55%, #9b6ed4 100%); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent2); }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    overflow: auto;
    background: repeating-linear-gradient(
      45deg,
      #fdf6ee,
      #fdf6ee 10px,
      #f9f0e5 10px,
      #f9f0e5 20px
    );
  }

  .grid-wrapper {
    background: white;
    border: 3px solid var(--accent);
    border-radius: 4px;
    box-shadow: 6px 6px 24px var(--shadow);
    overflow: hidden;
    user-select: none;
    position: relative;
  }

  /* Row numbers */
  .grid-with-numbers {
    display: flex;
    gap: 0;
  }
  .row-numbers {
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-right: 2px solid var(--border);
  }
  .row-num {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  .col-numbers {
    display: flex;
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    margin-left: 28px; /* row num width */
  }
  .col-num {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  #grid-canvas {
    display: block;
    cursor: crosshair;
  }

  /* Status bar */
  .statusbar {
    background: var(--panel);
    border-top: 2px solid var(--border);
    padding: 6px 20px;
    font-size: 0.7rem;
    color: var(--accent);
    display: flex;
    gap: 20px;
    align-items: center;
  }

  /* Legend display */
  .legend-area {
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    max-width: 600px;
    width: 100%;
  }
  .legend-area h3 {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .legend-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.7rem;
  }
  .legend-swatch {
    width: 18px; height: 18px; border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }

  .tooltip {
    position: fixed;
    background: linear-gradient(120deg, #4a1a7a 0%, #6b3fa0 55%, #9b6ed4 100%);
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    pointer-events: none;
    z-index: 1000;
    display: none;
  }
</style>
</head>
<body>

<header>
  <span class="yarn-icon">🧶</span>
  <div>
    <h1>SmyčkArt</h1>
    <span class="sub">Designer vzorů pro smyčkování</span>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Nástroje -->
    <div>
      <div class="section-title">Nástroje</div>
      <div class="tools">
        <button class="tool-btn active" data-tool="draw" title="Kreslit">✏️</button>
        <button class="tool-btn" data-tool="erase" title="Guma">🧹</button>
        <button class="tool-btn" data-tool="fill" title="Výplň">🪣</button>
        <button class="tool-btn" data-tool="pick" title="Pipeta">💉</button>
      </div>
      <div style="margin-top:6px; font-size:0.65rem; color:var(--accent); opacity:0.7;" id="tool-label">Aktivní: Tužka</div>
    </div>

    <!-- Barvy -->
    <div>
      <div class="section-title">Barva</div>
      <div class="palette" id="palette"></div>
      <div class="custom-color-row" style="margin-top:8px;">
        <input type="color" id="custom-color" value="#9b5e3b">
        <span>Vlastní barva</span>
      </div>
    </div>

    <!-- Symboly -->
    <div>
      <div class="section-title">Symboly / Smyčky</div>
      <div class="symbols" id="symbols"></div>
      <div style="margin-top:4px; font-size:0.65rem; color:var(--accent); opacity:0.7;">Klikni na symbol pak nakresli</div>
    </div>

    <!-- Nastavení mřížky -->
    <div>
      <div class="section-title">Mřížka</div>
      <div class="settings">
        <div class="setting-row">
          <label>Sloupce</label>
          <input type="number" id="cols-input" value="30" min="3" max="80">
        </div>
        <div class="setting-row">
          <label>Řádky</label>
          <input type="number" id="rows-input" value="30" min="3" max="80">
        </div>
        <div class="setting-row">
          <label>Velikost</label>
          <input type="range" id="cell-size" min="12" max="50" value="16">
          <span class="val" id="cell-size-val">16</span>
        </div>
        <div class="setting-row">
          <label>Mřížka</label>
          <input type="range" id="grid-opacity" min="0" max="100" value="100">
          <span class="val" id="grid-opacity-val">100</span>
        </div>
        <button class="btn" id="apply-grid" style="margin-top:4px;">Použít</button>
      </div>
    </div>

    <!-- Akce -->
    <div>
      <div class="section-title">Akce</div>
      <div class="btn-row">
        <button class="btn" id="btn-undo">↩ Zpět</button>
        <button class="btn" id="btn-clear">🗑 Smazat</button>
      </div>
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn primary" id="btn-export">💾 Uložit PNG</button>
      </div>
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn" id="btn-mirror-h">↔ Zrcadlit H</button>
        <button class="btn" id="btn-mirror-v">↕ Zrcadlit V</button>
      </div>
    </div>

  </div>

  <!-- CANVAS -->
  <div style="flex:1; display:flex; flex-direction:column; overflow:auto;">
    <div class="canvas-area" id="canvas-area">
      <div class="grid-wrapper" id="grid-wrapper">
        <div id="col-numbers-row" class="col-numbers"></div>
        <div class="grid-with-numbers">
          <div class="row-numbers" id="row-numbers"></div>
          <canvas id="grid-canvas"></canvas>
        </div>
      </div>
      <div class="legend-area" id="legend-area">
        <h3>Legenda barev</h3>
        <div class="legend-items" id="legend-items">
          <span style="font-size:0.7rem;opacity:0.6">Zatím žádné barvy...</span>
        </div>
      </div>
    </div>
    <div class="statusbar">
      <span id="status-pos">Pozice: –</span>
      <span id="status-color">Barva: –</span>
      <span>Tip: Táhni myší pro kreslení</span>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ==================== CONFIG ====================
const COLORS = [
  '#FFFFFF','#F5E6D3','#E8C9A0','#D4A96A','#C47C3E',
  '#9b5e3b','#5C3317','#2C1810','#000000','#4A90D9',
  '#7EC8E3','#A8D8A8','#4CAF50','#2E7D32','#F06292',
  '#E91E63','#FFD700','#FF8C00','#CE1818','#7B1FA2',
];

const SYMBOLS = [
  { sym: '', label: 'Žádný' },
  { sym: '×', label: 'Křížek' },
  { sym: '○', label: 'Kroužek' },
  { sym: '●', label: 'Puntík' },
  { sym: '▲', label: 'Trojúh.' },
  { sym: '◆', label: 'Kosočtv.' },
  { sym: '─', label: 'Vodorov.' },
  { sym: '│', label: 'Svislý' },
  { sym: '/', label: 'Diag. /' },
  { sym: '\\', label: 'Diag. \\' },
  { sym: '+', label: 'Plus' },
  { sym: '∪', label: 'Oblouk' },
];

const TOOL_LABELS = { draw:'Tužka', erase:'Guma', fill:'Výplň', pick:'Pipeta' };

// ==================== STATE ====================
let cols = 30, rows = 30, cellSize = 16;
let gridOpacity = 100;
let currentTool = 'draw';
let currentColor = '#D4A96A';
let currentSymbol = '';
let isDrawing = false;
let lastCell = null;

// Grid data: each cell { color: '#hex'|null, symbol: '' }
let grid = [];
let history = [];

function initGrid() {
  grid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      grid[r][c] = { color: null, symbol: '' };
    }
  }
}

function saveHistory() {
  history.push(JSON.parse(JSON.stringify(grid)));
  if (history.length > 50) history.shift();
}

// ==================== CANVAS ====================
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  canvas.width = cols * cellSize;
  canvas.height = rows * cellSize;
  buildNumbers();
  renderGrid();
}

function buildNumbers() {
  // Col numbers
  const colRow = document.getElementById('col-numbers-row');
  colRow.innerHTML = '';
  colRow.style.marginLeft = '28px';
  for (let c = 0; c < cols; c++) {
    const el = document.createElement('div');
    el.className = 'col-num';
    el.style.width = cellSize + 'px';
    el.style.height = '20px';
    el.textContent = (c + 1) % 5 === 0 || c === 0 ? (c + 1) : '';
    colRow.appendChild(el);
  }
  // Row numbers
  const rowNums = document.getElementById('row-numbers');
  rowNums.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    const el = document.createElement('div');
    el.className = 'row-num';
    el.style.height = cellSize + 'px';
    el.style.width = '28px';
    el.textContent = (r + 1) % 5 === 0 || r === 0 ? (r + 1) : '';
    rowNums.appendChild(el);
  }
}

function renderGrid() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Cells
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      const x = c * cellSize, y = r * cellSize;

      // Background
      if (cell.color) {
        ctx.fillStyle = cell.color;
        ctx.fillRect(x, y, cellSize, cellSize);
      } else {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x, y, cellSize, cellSize);
      }

      // Symbol
      if (cell.symbol) {
        // Determine text color based on bg brightness
        let textColor = '#000000';
        if (cell.color) {
          const r2 = parseInt(cell.color.slice(1,3),16);
          const g2 = parseInt(cell.color.slice(3,5),16);
          const b2 = parseInt(cell.color.slice(5,7),16);
          const lum = 0.299*r2 + 0.587*g2 + 0.114*b2;
          textColor = lum < 128 ? '#ffffff' : '#000000';
        }
        ctx.fillStyle = textColor;
        ctx.font = `${Math.floor(cellSize * 0.6)}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cell.symbol, x + cellSize/2, y + cellSize/2);
      }
    }
  }

  // Grid lines
  if (gridOpacity > 0) {
    // Thin lines every cell
    ctx.strokeStyle = `rgba(168,120,80,${gridOpacity/100 * 0.35})`;
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= rows; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * cellSize); ctx.lineTo(cols * cellSize, r * cellSize); ctx.stroke();
    }
    for (let c = 0; c <= cols; c++) {
      ctx.beginPath(); ctx.moveTo(c * cellSize, 0); ctx.lineTo(c * cellSize, rows * cellSize); ctx.stroke();
    }
    // Bold blue lines every 10 cells (like kanava)
    ctx.strokeStyle = `rgba(30,90,200,${gridOpacity/100 * 0.85})`;
    ctx.lineWidth = 2;
    for (let r = 0; r <= rows; r += 10) {
      ctx.beginPath(); ctx.moveTo(0, r*cellSize); ctx.lineTo(cols*cellSize, r*cellSize); ctx.stroke();
    }
    for (let c = 0; c <= cols; c += 10) {
      ctx.beginPath(); ctx.moveTo(c*cellSize, 0); ctx.lineTo(c*cellSize, rows*cellSize); ctx.stroke();
    }
  }

  updateLegend();
}

function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.floor(x / cellSize);
  const r = Math.floor(y / cellSize);
  if (r >= 0 && r < rows && c >= 0 && c < cols) return { r, c };
  return null;
}

function applyTool(r, c) {
  if (currentTool === 'draw') {
    grid[r][c].color = currentColor;
    grid[r][c].symbol = currentSymbol;
  } else if (currentTool === 'erase') {
    grid[r][c].color = null;
    grid[r][c].symbol = '';
  } else if (currentTool === 'pick') {
    if (grid[r][c].color) {
      currentColor = grid[r][c].color;
      updateColorUI();
    }
  } else if (currentTool === 'fill') {
    floodFill(r, c, grid[r][c].color);
  }
}

function floodFill(r, c, targetColor) {
  if (targetColor === currentColor) return;
  const stack = [[r, c]];
  const visited = new Set();
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const key = cr + ',' + cc;
    if (visited.has(key)) continue;
    if (cr < 0 || cr >= rows || cc < 0 || cc >= cols) continue;
    if (grid[cr][cc].color !== targetColor) continue;
    visited.add(key);
    grid[cr][cc].color = currentColor;
    grid[cr][cc].symbol = currentSymbol;
    stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
  }
}

// ==================== EVENTS ====================
canvas.addEventListener('mousedown', e => {
  isDrawing = true;
  saveHistory();
  const cell = getCellFromEvent(e);
  if (cell) { applyTool(cell.r, cell.c); lastCell = cell; renderGrid(); }
});
canvas.addEventListener('mousemove', e => {
  const cell = getCellFromEvent(e);
  if (cell) {
    document.getElementById('status-pos').textContent = `Pozice: ${cell.c+1}, ${cell.r+1}`;
    document.getElementById('status-color').textContent = `Barva buňky: ${grid[cell.r][cell.c].color || 'prázdná'}`;
    if (isDrawing && (lastCell?.r !== cell.r || lastCell?.c !== cell.c)) {
      applyTool(cell.r, cell.c);
      lastCell = cell;
      renderGrid();
    }
  }
});
canvas.addEventListener('mouseup', () => { isDrawing = false; lastCell = null; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  isDrawing = true;
  saveHistory();
  const touch = e.touches[0];
  const cell = getCellFromEvent(touch);
  if (cell) { applyTool(cell.r, cell.c); renderGrid(); }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const cell = getCellFromEvent(touch);
  if (cell && isDrawing) { applyTool(cell.r, cell.c); renderGrid(); }
}, { passive: false });
canvas.addEventListener('touchend', () => { isDrawing = false; });

// ==================== UI SETUP ====================
function buildPalette() {
  const palette = document.getElementById('palette');
  COLORS.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = color;
    if (color === currentColor) sw.classList.add('active');
    sw.addEventListener('click', () => {
      currentColor = color;
      document.getElementById('custom-color').value = color;
      updateColorUI();
    });
    palette.appendChild(sw);
  });
}

function updateColorUI() {
  document.querySelectorAll('.color-swatch').forEach((sw, i) => {
    sw.classList.toggle('active', COLORS[i] === currentColor);
  });
  document.getElementById('status-color').textContent = `Barva: ${currentColor}`;
}

function buildSymbols() {
  const symContainer = document.getElementById('symbols');
  SYMBOLS.forEach(({ sym, label }) => {
    const btn = document.createElement('button');
    btn.className = 'sym-btn' + (sym === '' ? ' active' : '');
    btn.textContent = sym || '–';
    btn.title = label;
    btn.addEventListener('click', () => {
      currentSymbol = sym;
      document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    symContainer.appendChild(btn);
  });
}

// Tool buttons
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tool-label').textContent = 'Aktivní: ' + TOOL_LABELS[currentTool];
    canvas.style.cursor = currentTool === 'erase' ? 'cell' : currentTool === 'pick' ? 'crosshair' : 'crosshair';
  });
});

// Custom color
document.getElementById('custom-color').addEventListener('input', e => {
  currentColor = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('active'));
});

// Grid settings
document.getElementById('cell-size').addEventListener('input', e => {
  document.getElementById('cell-size-val').textContent = e.target.value;
});
document.getElementById('grid-opacity').addEventListener('input', e => {
  document.getElementById('grid-opacity-val').textContent = e.target.value;
  gridOpacity = parseInt(e.target.value);
  renderGrid();
});

document.getElementById('apply-grid').addEventListener('click', () => {
  const newCols = parseInt(document.getElementById('cols-input').value);
  const newRows = parseInt(document.getElementById('rows-input').value);
  const newSize = parseInt(document.getElementById('cell-size').value);

  // Preserve existing data
  const oldGrid = JSON.parse(JSON.stringify(grid));
  cols = Math.max(3, Math.min(80, newCols));
  rows = Math.max(3, Math.min(80, newRows));
  cellSize = Math.max(12, Math.min(50, newSize));

  initGrid();
  for (let r = 0; r < Math.min(rows, oldGrid.length); r++) {
    for (let c = 0; c < Math.min(cols, (oldGrid[r] || []).length); c++) {
      grid[r][c] = oldGrid[r][c];
    }
  }
  setupCanvas();
});

// Undo
document.getElementById('btn-undo').addEventListener('click', () => {
  if (history.length > 0) {
    grid = history.pop();
    renderGrid();
  }
});

// Clear
document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('Opravdu smazat celý vzor?')) {
    saveHistory();
    initGrid();
    renderGrid();
  }
});

// Export PNG
document.getElementById('btn-export').addEventListener('click', () => {
  // Render clean version without grid overlay for export? No, include it.
  const link = document.createElement('a');
  link.download = 'vzor_smyčkování.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Mirror H
document.getElementById('btn-mirror-h').addEventListener('click', () => {
  saveHistory();
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < Math.floor(cols / 2); c++) {
      const tmp = grid[r][cols - 1 - c];
      grid[r][cols - 1 - c] = { ...grid[r][c] };
      grid[r][c] = tmp;
    }
  }
  renderGrid();
});

// Mirror V
document.getElementById('btn-mirror-v').addEventListener('click', () => {
  saveHistory();
  for (let r = 0; r < Math.floor(rows / 2); r++) {
    const tmp = grid[rows - 1 - r];
    grid[rows - 1 - r] = grid[r].map(c => ({ ...c }));
    grid[r] = tmp.map(c => ({ ...c }));
  }
  renderGrid();
});

// Legend
function updateLegend() {
  const usedColors = {};
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      if (cell.color) {
        const key = cell.color + (cell.symbol || '');
        if (!usedColors[key]) usedColors[key] = { color: cell.color, symbol: cell.symbol, count: 0 };
        usedColors[key].count++;
      }
    }
  }
  const legendItems = document.getElementById('legend-items');
  const keys = Object.keys(usedColors);
  if (keys.length === 0) {
    legendItems.innerHTML = '<span style="font-size:0.7rem;opacity:0.6">Zatím žádné barvy...</span>';
    return;
  }
  legendItems.innerHTML = keys.map(k => {
    const { color, symbol, count } = usedColors[k];
    return `<div class="legend-item">
      <div class="legend-swatch" style="background:${color}">${symbol ? `<span style="font-size:10px;display:flex;align-items:center;justify-content:center;height:100%">${symbol}</span>` : ''}</div>
      <span>${color}${symbol ? ' '+symbol : ''} (${count})</span>
    </div>`;
  }).join('');
}

// ==================== INIT ====================
buildPalette();
buildSymbols();
initGrid();
setupCanvas();
</script>
</body>
</html>
